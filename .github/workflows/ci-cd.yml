name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run linter
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # Run type check
      - name: TypeScript type check
        run: npm run typecheck
        continue-on-error: true

      # Build project
      - name: Build project
        run: npm run build

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: out/

  docker-build-push:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sense:latest
            ${{ secrets.DOCKER_USERNAME }}/sense:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sense:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sense:buildcache,mode=max

  notify:
    needs: [lint-and-build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build status
        run: |
          if [ "${{ needs.lint-and-build.result }}" == "success" ]; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed!"
          fi
