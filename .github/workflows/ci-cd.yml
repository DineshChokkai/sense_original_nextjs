name: build-and-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Type check
        run: npm run typecheck || true

      - name: Build
        run: npm run build

  docker-build:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t sense .

  notify:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build status
        run: |
          if [ "${{ needs.build-and-lint.result }}" == "success" ]; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed!"
          fi